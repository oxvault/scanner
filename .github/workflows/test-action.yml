name: Test Scan Action

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan vulnerable server (should find issues)
        id: scan
        uses: oxvault/scan-action@v1
        continue-on-error: true
        with:
          target: ./examples/vulnerable-servers/tool-poisoning
          fail-on: critical
          format: sarif
          skip-manifest: 'true'
          skip-egress: 'true'

      - name: Verify scan found issues
        shell: bash
        run: |
          if [ "${{ steps.scan.outcome }}" = "failure" ]; then
            echo "Action correctly failed on critical findings"
          else
            echo "ERROR: Action should have failed but didn't"
            exit 1
          fi
